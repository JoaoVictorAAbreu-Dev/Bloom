name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Android
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: "tools platform-tools platforms;android-36 build-tools;36.0.0"

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Detect release signing
        id: release-signing
        env:
          BLOOM_RELEASE_KEYSTORE_BASE64: ${{ secrets.BLOOM_RELEASE_KEYSTORE_BASE64 }}
          BLOOM_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.BLOOM_RELEASE_KEYSTORE_PASSWORD }}
          BLOOM_RELEASE_KEY_ALIAS: ${{ secrets.BLOOM_RELEASE_KEY_ALIAS }}
          BLOOM_RELEASE_KEY_PASSWORD: ${{ secrets.BLOOM_RELEASE_KEY_PASSWORD }}
        run: |
          if [ -n "$BLOOM_RELEASE_KEYSTORE_BASE64" ] &&
             [ -n "$BLOOM_RELEASE_KEYSTORE_PASSWORD" ] &&
             [ -n "$BLOOM_RELEASE_KEY_ALIAS" ] &&
             [ -n "$BLOOM_RELEASE_KEY_PASSWORD" ]; then
            echo "signed=true" >> "$GITHUB_OUTPUT"
            echo "apk_name=bloom-release-signed-apk" >> "$GITHUB_OUTPUT"
            echo "aab_name=bloom-release-signed-aab" >> "$GITHUB_OUTPUT"
          else
            echo "signed=false" >> "$GITHUB_OUTPUT"
            echo "apk_name=bloom-release-unsigned-apk" >> "$GITHUB_OUTPUT"
            echo "aab_name=bloom-release-unsigned-aab" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Android unit tests
        run: ./gradlew :app:testDebugUnitTest --no-daemon --no-parallel --console=plain

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --no-parallel --console=plain

      - name: Build release APK
        env:
          AI_BACKEND_BASE_URL: ${{ secrets.AI_BACKEND_BASE_URL }}
          AI_BACKEND_CLIENT_TOKEN: ${{ secrets.AI_BACKEND_CLIENT_TOKEN }}
          BLOOM_RELEASE_KEYSTORE_BASE64: ${{ secrets.BLOOM_RELEASE_KEYSTORE_BASE64 }}
          BLOOM_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.BLOOM_RELEASE_KEYSTORE_PASSWORD }}
          BLOOM_RELEASE_KEY_ALIAS: ${{ secrets.BLOOM_RELEASE_KEY_ALIAS }}
          BLOOM_RELEASE_KEY_PASSWORD: ${{ secrets.BLOOM_RELEASE_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --no-daemon --no-parallel --console=plain

      - name: Build release bundle
        env:
          AI_BACKEND_BASE_URL: ${{ secrets.AI_BACKEND_BASE_URL }}
          AI_BACKEND_CLIENT_TOKEN: ${{ secrets.AI_BACKEND_CLIENT_TOKEN }}
          BLOOM_RELEASE_KEYSTORE_BASE64: ${{ secrets.BLOOM_RELEASE_KEYSTORE_BASE64 }}
          BLOOM_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.BLOOM_RELEASE_KEYSTORE_PASSWORD }}
          BLOOM_RELEASE_KEY_ALIAS: ${{ secrets.BLOOM_RELEASE_KEY_ALIAS }}
          BLOOM_RELEASE_KEY_PASSWORD: ${{ secrets.BLOOM_RELEASE_KEY_PASSWORD }}
        run: ./gradlew :app:bundleRelease --no-daemon --no-parallel --console=plain

      - name: Verify release signing
        run: |
          if [ "${{ steps.release-signing.outputs.signed }}" = "true" ]; then
            "$ANDROID_HOME/build-tools/36.0.0/apksigner" verify --verbose app/build/outputs/apk/release/*.apk
          else
            echo "::notice::Release signing secrets are not configured; release APK/AAB artifacts are validation-only."
          fi

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: bloom-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload release APK
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.release-signing.outputs.apk_name }}
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload release bundle
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.release-signing.outputs.aab_name }}
          path: app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
          retention-days: 14

      - name: Upload Android test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bloom-android-test-reports
          path: app/build/reports/tests/testDebugUnitTest
          if-no-files-found: ignore
          retention-days: 14

  ai-proxy:
    name: AI Proxy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Run proxy tests
        run: ./gradlew -p backend/ai-proxy test --no-daemon --no-parallel --console=plain

      - name: Upload proxy test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bloom-ai-proxy-test-reports
          path: backend/ai-proxy/build/reports/tests/test
          if-no-files-found: ignore
          retention-days: 14
